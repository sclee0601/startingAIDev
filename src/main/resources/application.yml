spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stockdb
    username: devuser
    password: devpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  redis:
    host: localhost
    port: 6379

server:
  port: 8080

app:
  ai:
    summary-enabled: true
    summary-cache-key-prefix: ai-summary:
