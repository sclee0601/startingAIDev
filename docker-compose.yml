services:
  db:
    image: postgres:15
    container_name: stock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: stockdb
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
