version: '3.8'
services:
  db:
    image: postgres:15
    container_name: stock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: stockdb
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
